<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSR Piggyback Signal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            width: 320px;
            padding: 16px;
            background: #0f0f14;
            color: #e0e0e6;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2a35;
        }
        .header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #a78bfa;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s infinite;
        }
        .status-dot.connected { background: #22c55e; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .section {
            margin-bottom: 12px;
        }
        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b6b80;
            margin-bottom: 4px;
        }
        .value {
            font-size: 12px;
            color: #c0c0cc;
            word-break: break-all;
        }
        .value.highlight { color: #a78bfa; font-weight: 500; }
        .value.error { color: #f87171; }
        .value.success { color: #4ade80; }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            border: none;
            border-radius: 6px;
            background: #7c3aed;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #6d28d9; }
        .btn:disabled {
            background: #3a3a4a;
            color: #6b6b80;
            cursor: not-allowed;
        }
        .footer {
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #2a2a35;
            font-size: 10px;
            color: #4a4a5a;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="status-dot" id="statusDot"></div>
        <h1>MSR Piggyback Signal</h1>
    </div>

    <div class="section">
        <div class="label">CDP Status</div>
        <div class="value" id="cdpStatus">Checking...</div>
    </div>

    <div class="section">
        <div class="label">Last Signal</div>
        <div class="value" id="lastSignalTime">No signals sent yet</div>
    </div>

    <div class="section">
        <div class="label">Signal Status</div>
        <div class="value" id="signalStatus">—</div>
    </div>

    <div class="section">
        <div class="label">Target URL</div>
        <div class="value" id="targetUrl">—</div>
    </div>

    <button class="btn" id="triggerBtn">Trigger Manual Scrape</button>

    <div class="footer">MSR-Insight Research • Session-Piggyback Protocol</div>

    <script src="popup.js"></script>
</body>
</html>
